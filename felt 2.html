<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>FELT - Poker Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080808; --surface: #111111; --surface2: #161616; --border: #1e1e1e;
    --gold: #c9a84c; --gold-dim: #6b5520; --gold-faint: #1a1608;
    --green: #27ae60; --red: #e74c3c;
    --cream: #f0e6c8; --muted: #555;
    --font-d: 'Playfair Display', Georgia, serif;
    --font-m: 'IBM Plex Mono', 'Courier New', monospace;
  }
  .app { background: var(--bg); min-height: 100vh; color: var(--cream); display: flex; flex-direction: column; max-width: 600px; margin: 0 auto; font-family: var(--font-m); }
  .app-header { padding: 1.25rem 1.25rem 0.875rem; border-bottom: 1px solid var(--border); text-align: center; }
  .header-row { display: flex; justify-content: center; align-items: center; gap: 1rem; }
  .logo { font-family: var(--font-d); font-size: 2rem; font-weight: 900; letter-spacing: 0.35em; color: var(--gold); }
  .suit-deco { color: var(--gold-dim); font-size: 1.1rem; }
  .tagline { font-size: 0.6rem; letter-spacing: 0.25em; color: #333; margin-top: 0.3rem; }
  .btn-reset { background: transparent; border: none; color: #2a2a2a; font-family: var(--font-m); font-size: 0.55rem; letter-spacing: 0.15em; cursor: pointer; margin-top: 0.4rem; padding: 0.2rem 0.5rem; transition: color 0.15s; }
  .btn-reset:hover { color: var(--red); }
  .header-btns { display: flex; gap: 0.75rem; justify-content: center; margin-top: 0.2rem; }
  .save-menu { min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; max-width: 600px; margin: 0 auto; padding: 3rem 1.5rem 2rem; font-family: var(--font-m); }
  .save-logo-row { display: flex; justify-content: center; align-items: center; gap: 1rem; margin-bottom: 0.4rem; }
  .save-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .save-entry { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--gold-dim); border-radius: 4px; padding: 1rem 1.25rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 1rem; transition: border-color 0.15s, background 0.15s; }
  .save-entry:hover { background: var(--surface2); border-left-color: var(--gold); }
  .save-entry-info { display: flex; flex-direction: column; gap: 0.25rem; }
  .save-entry-name { font-family: var(--font-d); font-size: 1rem; color: var(--cream); }
  .save-entry-actions { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
  .save-continue { font-size: 0.62rem; letter-spacing: 0.12em; color: var(--gold); }
  .save-delete { background: transparent; border: none; color: #333; cursor: pointer; font-size: 0.9rem; padding: 0.2rem 0.3rem; transition: color 0.15s; }
  .save-delete:hover { color: var(--red); }
  .save-new-form { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.25rem; }
  .main { flex: 1; padding: 1.25rem; overflow-y: auto; }
  .bottom-nav { display: flex; border-top: 1px solid var(--border); background: var(--bg); position: sticky; bottom: 0; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.2rem; padding: 0.7rem 0.25rem; background: transparent; border: none; border-top: 2px solid transparent; cursor: pointer; color: #3a3a3a; transition: color 0.15s; }
  .nav-btn-active { color: var(--gold); border-top-color: var(--gold); }
  .nav-icon { font-size: 1rem; }
  .nav-label { font-family: var(--font-m); font-size: 0.5rem; letter-spacing: 0.12em; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .section-title { font-family: var(--font-d); font-size: 1rem; font-weight: 700; letter-spacing: 0.15em; color: var(--gold); }
  .muted { font-size: 0.72rem; color: var(--muted); }
  .col-green { color: var(--green); }
  .col-red { color: var(--red); }
  .empty { color: var(--muted); text-align: center; padding: 2.5rem 1rem; border: 1px dashed var(--border); border-radius: 4px; font-size: 0.78rem; line-height: 1.6; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 1.5rem; margin-bottom: 0.75rem; }
  .setup-card { max-width: 380px; margin: 1rem auto; }
  .setup-suit { text-align: center; font-size: 2.5rem; color: var(--gold-dim); margin-bottom: 0.75rem; }
  .player-inputs { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.25rem; }
  .player-input-row { display: flex; align-items: center; gap: 0.75rem; }
  .player-num { font-size: 0.65rem; color: var(--muted); width: 1.5rem; }
  .input { background: #0c0c0c; border: 1px solid var(--border); border-radius: 3px; color: var(--cream); padding: 0.6rem 0.75rem; font-family: var(--font-m); font-size: 0.82rem; width: 100%; outline: none; transition: border-color 0.15s; }
  .input:focus { border-color: var(--gold-dim); }
  .field-label { font-size: 0.62rem; letter-spacing: 0.15em; color: var(--muted); display: block; margin-bottom: 0.4rem; }
  .field-label-sm { font-size: 0.58rem; letter-spacing: 0.1em; color: var(--muted); display: block; margin-bottom: 0.35rem; }
  .btn-primary { background: var(--gold); color: #080808; border: none; border-radius: 3px; padding: 0.75rem 1.5rem; font-family: var(--font-m); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.12em; cursor: pointer; width: 100%; transition: background 0.15s; }
  .btn-primary:hover { background: #dbbe60; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 3px; padding: 0.6rem 0.875rem; font-family: var(--font-m); font-size: 0.68rem; cursor: pointer; letter-spacing: 0.08em; transition: all 0.15s; width: 100%; }
  .btn-ghost:hover { border-color: var(--gold-dim); color: var(--cream); }
  .btn-danger { background: transparent; border: 1px solid #7a1a1a; color: #c0392b; border-radius: 3px; padding: 0.4rem 0.75rem; font-family: var(--font-m); font-size: 0.65rem; cursor: pointer; letter-spacing: 0.1em; transition: all 0.15s; }
  .btn-danger:hover { background: #c0392b; color: white; }
  .btn-log-hand { background: transparent; border: 1px solid var(--gold-dim); color: var(--gold); border-radius: 3px; padding: 0.3rem 0.65rem; font-family: var(--font-m); font-size: 0.62rem; cursor: pointer; letter-spacing: 0.1em; transition: all 0.15s; }
  .btn-log-hand:hover { background: var(--gold-dim); }
  .btn-close-session { background: var(--gold-faint); border: 1px solid var(--gold-dim); color: var(--gold); border-radius: 3px; padding: 0.5rem 1rem; font-family: var(--font-m); font-size: 0.68rem; cursor: pointer; letter-spacing: 0.12em; transition: all 0.15s; }
  .btn-close-session:hover { background: var(--gold-dim); }
  .btn-add-session { background: transparent; border: 1px dashed var(--border); color: var(--muted); border-radius: 3px; padding: 0.6rem; font-family: var(--font-m); font-size: 0.68rem; cursor: pointer; width: 100%; letter-spacing: 0.1em; transition: all 0.15s; margin-top: 0.5rem; }
  .btn-add-session:hover { border-color: var(--gold-dim); color: var(--gold); }
  .btn-undo { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 3px; padding: 0.55rem 0.75rem; font-family: var(--font-m); font-size: 0.65rem; cursor: pointer; letter-spacing: 0.1em; transition: all 0.15s; flex-shrink: 0; }
  .btn-undo:hover:not(:disabled) { border-color: var(--gold-dim); color: var(--cream); }
  .btn-undo:disabled { opacity: 0.25; cursor: not-allowed; }
  .btn-confirm { background: var(--gold); color: #080808; border: none; border-radius: 3px; padding: 0.55rem 1.25rem; font-family: var(--font-m); font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; cursor: pointer; flex: 1; transition: background 0.15s; }
  .btn-confirm:hover { background: #dbbe60; }
  .leaderboard { display: flex; flex-direction: column; gap: 0.4rem; }
  .lb-tabs { display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  .lb-tab { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 3px; padding: 0.3rem 0.6rem; font-family: var(--font-m); font-size: 0.62rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s; }
  .lb-tab:hover { border-color: var(--gold-dim); color: var(--cream); }
  .lb-tab-active { background: var(--gold-faint); border-color: var(--gold-dim); color: var(--gold); }
  .lb-season-group { display: flex; align-items: center; gap: 0.25rem; }
  .lb-season-label { font-size: 0.58rem; letter-spacing: 0.15em; color: var(--gold-dim); padding-left: 0.25rem; }
  .lb-section-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--gold-dim); margin-bottom: 0.75rem; }
  .bust-notice { background: #1a0808; border: 1px solid #7a1a1a; border-radius: 3px; padding: 0.6rem 0.875rem; font-size: 0.75rem; color: #e07070; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .bust-dismiss { background: transparent; border: none; color: #555; cursor: pointer; font-size: 0.85rem; padding: 0; margin-left: 0.5rem; }
  .bust-dismiss:hover { color: var(--red); }
  .lb-row { display: flex; align-items: center; gap: 0.875rem; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: 4px; padding: 0.875rem 1rem; }
  .lb-up { border-left-color: var(--green); }
  .lb-down { border-left-color: var(--red); }
  .lb-rank { font-size: 1.1rem; width: 2rem; text-align: center; }
  .lb-info { flex: 1; display: flex; flex-direction: column; gap: 0.2rem; }
  .lb-name { font-family: var(--font-d); font-size: 0.95rem; color: var(--cream); }
  .lb-meta { font-size: 0.62rem; color: var(--muted); }
  .lb-pnl { font-family: var(--font-m); font-size: 1rem; font-weight: 500; }
  .night-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 0.5rem; overflow: hidden; }
  .night-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; cursor: pointer; transition: background 0.15s; }
  .night-header:hover { background: var(--surface2); }
  .night-label { font-family: var(--font-d); font-size: 1rem; color: var(--gold); letter-spacing: 0.05em; }
  .night-body { border-top: 1px solid var(--border); padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .expand-icon { color: var(--gold-dim); font-size: 0.65rem; flex-shrink: 0; }

  .night-label-preview { font-family: var(--font-d); font-size: 0.9rem; color: var(--gold); text-align: center; padding: 0.4rem; background: var(--gold-faint); border-radius: 3px; }
  .session-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .session-block-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; cursor: pointer; transition: background 0.15s; }
  .session-block-header:hover { background: #1a1a1a; }
  .sb-left { display: flex; align-items: center; gap: 0.6rem; }
  .sb-title { font-family: var(--font-d); color: var(--cream); font-size: 0.88rem; }
  .sb-right { display: flex; align-items: center; gap: 0.75rem; }

  .badge-open { background: #0d1f10; color: var(--green); border: 1px solid #1a4021; }
  .badge-closed { background: #1a1207; color: var(--gold-dim); border: 1px solid var(--gold-dim); }
  .session-block-body { border-top: 1px solid var(--border); padding: 0.875rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .session-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center; }
  .sub-section-label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--gold-dim); margin-bottom: 0.4rem; }
  .stacks-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; }

  .st-dealer { border-color: var(--gold-dim); background: var(--gold-faint); }

  .st-diff { font-size: 0.62rem; }

  .result-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; padding: 0.35rem 0; border-bottom: 1px solid #161616; }
  .result-row:last-child { border-bottom: none; }
  .result-name { color: var(--cream); }
  .result-right { display: flex; gap: 0.875rem; align-items: center; }
  .hands-section-header { display: flex; justify-content: space-between; align-items: center; }
  .new-session-form { margin-top: 0.5rem; }

  .ns-player-row:last-of-type { border-bottom: none; }
  .ns-buyin { width: 6rem; flex-shrink: 0; }

  .dealer-pick-btn { background: #0c0c0c; border: 1px solid var(--border); color: var(--muted); border-radius: 3px; padding: 0.4rem 0.75rem; font-family: var(--font-m); font-size: 0.72rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 0.3rem; }
  .dealer-pick-btn:hover { border-color: var(--gold-dim); color: var(--cream); }
  .dpb-active { background: var(--gold-faint); border-color: var(--gold-dim); color: var(--gold); }
  .dp-chip { font-size: 0.8rem; }

  .modal { background: var(--surface); border: 1px solid var(--gold-dim); border-radius: 4px; padding: 1.5rem; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }

  .close-input-wrap { flex-shrink: 0; width: 6rem; }

  .bal-ok { border-color: #1a4021; }

<body style="margin:0;background:#080808;">

        '</div>';
    });
  </script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <script type="text/babel" data-presets="react" data-plugins="transform-optional-chaining,transform-nullish-coalescing-operator">
    const { useState, useEffect } = React;


const KEY = "felt_poker_v3";
const uid = () => Math.random().toString(36).slice(2, 10);
const fmt = n => (n >= 0 ? "+" : "") + "£" + Math.abs(n).toFixed(2);
const fmtDate = d => new Date(d).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
const DEFAULT_BUYIN = 1700;

const STREETS = ["preflop", "flop", "turn", "river"];
const STREET_LABELS = { preflop: "PRE-FLOP", flop: "FLOP", turn: "TURN", river: "RIVER" };
const ACTION_COLORS = { bet: "#c9a84c", raise: "#e8b84b", call: "#7fb3c8", check: "#4a4a4a", fold: "#c0392b", "all-in": "#e74c3c", "fold-ante": "#8b4513" };
const ANTE = 20;
const PREFLOP_DEFAULT_BET = 40;

// -- Helpers -------------------------------------------------------------------
const nightLabel = n => `Season ${n.season}, Week ${n.week}`;

const POINTS_DIVISOR = 500;

function sessionResults(session) {
  return (session.playerIds || []).map(pid => {
    const buyIn = session.buyIns?.[pid] || 0;
    const cashOut = session.cashOuts?.[pid] ?? null;
    const pnl = cashOut !== null ? cashOut - buyIn : null;
    const points = cashOut !== null ? Math.floor(cashOut / POINTS_DIVISOR) : null;
    return { playerId: pid, buyIn, cashOut, pnl, points };
  });
}

function calcLeaderboard(players, nights) {
  const m = {};
  players.forEach(p => (m[p.id] = { ...p, points: 0, sessions: 0, wins: 0 }));
  nights.forEach(night =>
    (night.sessions || []).forEach(sess => {
      if (!sess.closed) return;
      sessionResults(sess).forEach(r => {
        if (!m[r.playerId] || r.points === null) return;
        m[r.playerId].points += r.points;
        m[r.playerId].sessions++;
        if (r.pnl > 0) m[r.playerId].wins++;
      });
    })
  );
  return Object.values(m).sort((a, b) => b.points - a.points);
}

// Points leaderboard for a single night
function calcNightLeaderboard(players, night) {
  const m = {};
  players.forEach(p => (m[p.id] = { ...p, points: 0, sessions: 0 }));
  (night.sessions || []).forEach(sess => {
    if (!sess.closed) return;
    sessionResults(sess).forEach(r => {
      if (!m[r.playerId] || r.points === null) return;
      m[r.playerId].points += r.points;
      m[r.playerId].sessions++;
    });
  });
  return Object.values(m).filter(p => p.sessions > 0).sort((a, b) => b.points - a.points);
}

// Sum chips committed across all streets (action.amount = actual chips added to pot)
function computeCommitted(streets) {
  const c = {};
  STREETS.forEach(s =>
    (streets[s] || []).forEach(a => {
      if (["bet", "raise", "call", "all-in", "fold-ante"].includes(a.type) && a.amount)
        c[a.playerId] = (c[a.playerId] || 0) + a.amount;
    })
  );
  return c;
}

function getFoldedSet(streets) {
  const f = new Set();
  STREETS.forEach(s => (streets[s] || []).forEach(a => { if (a.type === "fold" || a.type === "fold-ante") f.add(a.playerId); }));
  return f;
}

function buildRotation(sessionPlayers, dealerStartIdx, handNumber, activePIds) {
  const n = sessionPlayers.length;
  const dealerIdx = (dealerStartIdx + handNumber - 1) % n;
  const ordered = [];
  for (let i = 1; i <= n; i++) {
    const pid = sessionPlayers[(dealerIdx + i) % n]?.id;
    if (activePIds.includes(pid)) ordered.push(pid);
  }
  return ordered;
}

function getDealerPId(sessionPlayers, dealerStartIdx, handNumber) {
  return sessionPlayers[(dealerStartIdx + handNumber - 1) % sessionPlayers.length]?.id;
}

function nextInRotation(rotation, currentPId, foldedSet) {
  const n = rotation.length;
  const startIdx = rotation.indexOf(currentPId);
  if (startIdx === -1) return rotation.find(pid => !foldedSet.has(pid)) || "";
  for (let i = 1; i <= n; i++) {
    const pid = rotation[(startIdx + i) % n];
    if (!foldedSet.has(pid)) return pid;
  }
  return "";
}

// Replay a street's actions to derive betting state.
// betLevel = max total contribution by any one player this street (the price to stay in).
function replayStreetState(acts) {
  let betLevel = 0;
  const contribs = {};
  let actedIds = new Set();
  for (const a of acts) {
    if (["bet", "raise", "call", "all-in", "fold-ante"].includes(a.type) && a.amount != null) {
      contribs[a.playerId] = (contribs[a.playerId] || 0) + a.amount;
    }
    if (a.type === "bet" || a.type === "raise" || a.type === "all-in") {
      if ((contribs[a.playerId] || 0) > betLevel) {
        betLevel = contribs[a.playerId];
        actedIds = new Set([a.playerId]); // everyone else must respond
      } else {
        actedIds.add(a.playerId); // all-in for less - doesn't reopen action
      }
    } else {
      actedIds.add(a.playerId);
    }
  }
  return { betLevel, contribs, actedIds };
}

// -- Setup ---------------------------------------------------------------------
function SetupScreen({ onSave }) {
  const [names, setNames] = useState(["", "", "", "", "", ""]);
  const update = (i, v) => setNames(n => n.map((x, j) => (j === i ? v : x)));
  const save = () => {
    const valid = names.filter(n => n.trim());
    if (valid.length < 2) return alert("Add at least 2 players.");
    onSave(valid.map(name => ({ id: uid(), name: name.trim() })));
  };
  return (
    <div className="card setup-card">
      <div className="setup-suit">♠</div>
      <h2 className="section-title" style={{ textAlign: "center", marginBottom: "0.25rem" }}>WHO'S PLAYING?</h2>
      <p className="muted" style={{ textAlign: "center", marginBottom: "1.5rem" }}>Add your regulars to get started.</p>
      <div className="player-inputs">
        {names.map((n, i) => (
          <div key={i} className="player-input-row">
            <span className="player-num">P{i + 1}</span>
            <input className="input" placeholder={`Player ${i + 1}`} value={n} onChange={e => update(i, e.target.value)} />
          </div>
        ))}
      </div>
      <button className="btn-primary" onClick={save}>START THE GAME →</button>
    </div>
  );
}

// -- Hand Logger ---------------------------------------------------------------
function HandLogger({ sessionPlayers, handNumber, dealerStartIdx, stacks, onSave, onCancel }) {
  const dealerPId = getDealerPId(sessionPlayers, dealerStartIdx, handNumber);
  const pMap = Object.fromEntries(sessionPlayers.map(p => [p.id, p.name]));

  const [step, setStep] = useState(0);
  const [activePIds, setActivePIds] = useState(sessionPlayers.map(p => p.id));
  const [currentStreetIdx, setCurrentStreetIdx] = useState(0);
  const [streets, setStreets] = useState({ preflop: [], flop: [], turn: [], river: [] });
  const [actorPId, setActorPId] = useState("");
  const [aType, setAType] = useState("check");
  const [aAmount, setAAmount] = useState("");
  const [showdown, setShowdown] = useState({});
  const [winnerId, setWinnerId] = useState("");

  const currentStreet = STREETS[currentStreetIdx];

  // -- Single source of truth: derive ALL betting state from streets ----------
  const foldedSet = getFoldedSet(streets);
  const rotation = buildRotation(sessionPlayers, dealerStartIdx, handNumber, activePIds);
  const stillIn = rotation.filter(pid => !foldedSet.has(pid));
  const { betLevel, contribs: streetContribs, actedIds } = replayStreetState(streets[currentStreet]);
  const hasBet = betLevel > 0;
  // All-in players have committed their full stack - they've acted but can't call/raise
  const allInSet = new Set(
    sessionPlayers.filter(p => {
      const stackLeft = (stacks[p.id] ?? DEFAULT_BUYIN) - (computeCommitted(streets)[p.id] || 0);
      return stackLeft <= 0 && !foldedSet.has(p.id);
    }).map(p => p.id)
  );
  // Betting complete when every non-folded, non-all-in player has acted
  const activeForBetting = stillIn.filter(pid => !allInSet.has(pid));
  const bettingComplete = activeForBetting.length === 0 || activeForBetting.every(pid => actedIds.has(pid));
  const callAmount = Math.max(0, betLevel - (streetContribs[actorPId] || 0));
  const actorStack = (stacks[actorPId] ?? DEFAULT_BUYIN) - (computeCommitted(streets)[actorPId] || 0);

  const committed = computeCommitted(streets);
  const livePot = Object.values(committed).reduce((s, v) => s + v, 0);
  const liveStacks = Object.fromEntries(sessionPlayers.map(p => [
    p.id, (stacks[p.id] ?? DEFAULT_BUYIN) - (committed[p.id] || 0)
  ]));

  const isPrefop = currentStreetIdx === 0;
  const availableActions = hasBet
    ? (callAmount >= actorStack ? (isPrefop ? ["fold-ante", "all-in"] : ["fold", "all-in"]) : (isPrefop ? ["fold-ante", "call", "raise", "all-in"] : ["fold", "call", "raise", "all-in"]))
    : (isPrefop ? ["check", "bet", "fold-ante", "all-in"] : ["check", "bet", "fold", "all-in"]);

  const setFirstActor = (currentStreets) => {
    const folded = getFoldedSet(currentStreets);
    const first = rotation.find(pid => !folded.has(pid)) || "";
    setActorPId(first);
  };

  useEffect(() => {
    if (step === 1) { setFirstActor(streets); setAType("check"); }
  }, [step]);

  const advanceStreet = () => {
    if (currentStreetIdx >= 3) { setStep(2); return; }
    const nextIdx = currentStreetIdx + 1;
    setCurrentStreetIdx(nextIdx);
    setAAmount("");
    setAType("check");
    setFirstActor(streets);
  };

  const gotoStreet = (idx) => {
    setCurrentStreetIdx(idx);
    setAAmount("");
    setFirstActor(streets);
  };

  const addAction = () => {
    if (!actorPId) return;
    let amount = null;

    if (aType === "all-in") {
      amount = actorStack;
      if (amount <= 0) return alert("Player has no chips left.");
    } else if (aType === "fold-ante") {
      amount = ANTE;
    } else if (aType === "call") {
      if (callAmount <= 0) return;
      amount = callAmount;
    } else if (aType === "bet") {
      const v = parseFloat(aAmount);
      if (!aAmount || isNaN(v) || v <= 0) return alert("Enter a bet amount.");
      amount = v;
    } else if (aType === "raise") {
      const raiseTo = parseFloat(aAmount);
      if (!aAmount || isNaN(raiseTo) || raiseTo <= 0) return alert("Enter a raise amount.");
      if (raiseTo <= betLevel) return alert(`Raise must be above current bet of £${betLevel.toFixed(2)}.`);
      // amount = additional chips this player puts in
      amount = raiseTo - (streetContribs[actorPId] || 0);
    }

    const action = { id: uid(), playerId: actorPId, type: aType, amount };
    const newStreets = { ...streets, [currentStreet]: [...streets[currentStreet], action] };
    setStreets(newStreets);
    setAAmount("");

    // Check if only one player remains - hand is over, auto-save
    const newFolded = getFoldedSet(newStreets);
    const remaining = rotation.filter(pid => !newFolded.has(pid));
    if (remaining.length === 1) {
      const lastMan = remaining[0];
      const pot = Object.values(computeCommitted(newStreets)).reduce((s, v) => s + v, 0);
      const newStacks = { ...stacks };
      Object.entries(computeCommitted(newStreets)).forEach(([pid, amt]) => {
        newStacks[pid] = (newStacks[pid] ?? DEFAULT_BUYIN) - amt;
      });
      newStacks[lastMan] = (newStacks[lastMan] ?? DEFAULT_BUYIN) + pot;
      onSave({ hand: { id: uid(), number: handNumber, streets: newStreets, showdown: {}, winnerId: lastMan, pot, dealerPId }, newStacks });
      return;
    }

    // Advance actor
    const next = nextInRotation(rotation, actorPId, newFolded);
    setActorPId(next);

    // Keep aType sensible for next player
    const newBetLevel = replayStreetState(newStreets[currentStreet]).betLevel;
    if (newBetLevel > 0 && !["fold", "call", "raise", "all-in"].includes(aType)) setAType("call");
    else if (newBetLevel === 0 && !["check", "bet", "fold", "all-in"].includes(aType)) setAType("check");
    else if (aType === "bet" || aType === "raise") setAType(newBetLevel > 0 ? "call" : "check");
  };

  const removeLastAction = () => {
    const acts = streets[currentStreet];
    if (!acts.length) return;
    const removed = acts[acts.length - 1];
    const newStreets = { ...streets, [currentStreet]: acts.slice(0, -1) };
    setStreets(newStreets);
    setActorPId(removed.playerId);
    const { betLevel: newBet } = replayStreetState(newStreets[currentStreet]);
    setAType(newBet > 0 ? "call" : "check");
  };

  const saveHand = () => {
    if (!winnerId) return alert("Select a winner.");
    const newStacks = { ...stacks };
    Object.entries(committed).forEach(([pid, amt]) => {
      newStacks[pid] = (newStacks[pid] ?? DEFAULT_BUYIN) - amt;
    });
    newStacks[winnerId] = (newStacks[winnerId] ?? DEFAULT_BUYIN) + livePot;
    onSave({ hand: { id: uid(), number: handNumber, streets, showdown, winnerId, pot: livePot, dealerPId }, newStacks });
  };

  // -- Step 0: Select players ------------------------------------------------
  if (step === 0) return (
    <div className="hand-logger">
      <div className="hl-header">
        <span className="hl-title">HAND #{handNumber}</span>
        <button className="hl-cancel" onClick={onCancel}>✕</button>
      </div>
      <div className="dealer-banner">
        <span className="dealer-label">DEALER</span>
        <span className="dealer-name">{pMap[dealerPId] || "—"}</span>
        <span className="dealer-chip">♦</span>
      </div>
      <p className="muted" style={{ margin: "0.875rem 0 0.6rem" }}>Who's in this hand?</p>
      <div className="player-check-list">
        {sessionPlayers.map(p => (
          <label key={p.id} className="player-check-row">
            <input type="checkbox" checked={activePIds.includes(p.id)}
              onChange={e => setActivePIds(prev => e.target.checked ? [...prev, p.id] : prev.filter(x => x !== p.id))} />
            <span className="pcr-name">{p.name}</span>
            {p.id === dealerPId && <span className="dealer-badge">D</span>}
            <span className="pcr-stack muted">£{(stacks[p.id] ?? DEFAULT_BUYIN).toFixed(0)}</span>
          </label>
        ))}
      </div>
      <button className="btn-primary" style={{ marginTop: "1.25rem" }}
        onClick={() => { if (activePIds.length < 2) return alert("Need at least 2 players."); setStep(1); }}>
        DEAL CARDS →
      </button>
    </div>
  );

  // -- Step 1: Playing -------------------------------------------------------
  if (step === 1) {
    const actorName = pMap[actorPId] || "—";
    const currentActions = streets[currentStreet];
    const isLastStreet = currentStreetIdx === 3;
    const needsAmt = aType === "bet" || aType === "raise";

    return (
      <div className="hand-logger">
        <div className="hl-header">
          <div>
            <span className="hl-title">HAND #{handNumber}</span>
            <span className="dealer-inline muted"> · D: {pMap[dealerPId]}</span>
          </div>
          <button className="hl-cancel" onClick={onCancel}>✕</button>
        </div>

        <div className="street-tabs">
          {STREETS.map((s, i) => (
            <button key={s}
              className={`street-tab ${i === currentStreetIdx ? "st-active" : i < currentStreetIdx ? "st-done" : "st-future"}`}
              onClick={() => i < currentStreetIdx && gotoStreet(i)}>
              {s === "preflop" ? "PRE" : STREET_LABELS[s].slice(0, 3)}
            </button>
          ))}
        </div>

        <div className="live-info">
          <div className="pot-display">
            <span className="pot-label">POT</span>
            <span className="pot-value">£{livePot.toFixed(2)}</span>
            {hasBet && <span className="bet-level-tag">BET £{betLevel.toFixed(2)}</span>}
          </div>
          <div className="stacks-row">
            {sessionPlayers.filter(p => activePIds.includes(p.id)).map(p => {
              const isDealer = p.id === dealerPId;
              const isFolded = foldedSet.has(p.id);
              const isAllIn = allInSet.has(p.id);
              const isActor = p.id === actorPId && !bettingComplete;
              const owes = hasBet && !isFolded && !isAllIn
                ? Math.max(0, betLevel - (streetContribs[p.id] || 0))
                : 0;
              return (
                <div key={p.id} className={`stack-chip ${isFolded ? "sc-folded" : ""} ${isActor ? "sc-active" : ""} ${isAllIn ? "sc-allin" : ""}`}>
                  {isDealer && <span className="sc-dealer">D</span>}
                  <span className="sc-name">{p.name.split(" ")[0]}</span>
                  <span className="sc-amount">£{liveStacks[p.id]?.toFixed(0)}</span>
                  {isFolded ? <span className="sc-fold-tag">OUT</span>
                    : isAllIn ? <span className="sc-allin-tag">ALL IN</span>
                    : owes > 0 ? <span className="sc-owes">£{owes.toFixed(0)}</span>
                    : null}
                </div>
              );
            })}
          </div>
        </div>

        {bettingComplete ? (
          <div className="betting-complete">
            <span className="bc-label">✓ Betting closed</span>
            <button className="btn-primary" onClick={advanceStreet} style={{ marginTop: "0.75rem" }}>
              {isLastStreet ? "SHOWDOWN →" : `${STREET_LABELS[STREETS[currentStreetIdx + 1]]} →`}
            </button>
          </div>
        ) : stillIn.filter(p => !allInSet.has(p)).length > 0 ? (
          <div className="actor-panel">
            <div className="actor-name-row">
              <span className="actor-label">NOW ACTING</span>
              <span className="actor-name">{actorName}</span>
              {hasBet && callAmount > 0 && (
                <span className="actor-to-call muted">to call: £{callAmount.toFixed(2)}</span>
              )}
            </div>

            <div className="action-btns">
              {availableActions.map(t => (
                <button key={t}
                  className={`action-btn ${aType === t ? "ab-active" : ""}`}
                  style={aType === t ? { borderColor: ACTION_COLORS[t], color: ACTION_COLORS[t] } : {}}
                  onClick={() => {
                    setAType(t);
                    if (t === "bet") setAAmount(isPrefop ? String(PREFLOP_DEFAULT_BET) : "");
                    else setAAmount("");
                  }}>
                  {t === "call" ? `CALL £${callAmount.toFixed(2)}`
                    : t === "all-in" ? `ALL IN £${actorStack.toFixed(0)}`
                    : t === "fold-ante" ? `FOLD (PAY £${ANTE})`
                    : t.toUpperCase()}
                </button>
              ))}
            </div>

            {needsAmt && (
              <div className="amount-row">
                <span className="amount-prefix">{aType === "raise" ? "RAISE TO £" : "£"}</span>
                <input className="input amount-input" type="number" min="0" step="0.50"
                  placeholder={aType === "raise" ? `above £${betLevel.toFixed(2)}` : "0.00"}
                  value={aAmount}
                  onChange={e => setAAmount(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && addAction()} />
              </div>
            )}

            <div className="actor-footer">
              <button className="btn-undo" onClick={removeLastAction} disabled={!currentActions.length}>← UNDO</button>
              <button className="btn-confirm" onClick={addAction}>
                {aType === "call" ? `CALL £${callAmount.toFixed(2)}`
                  : aType === "all-in" ? `ALL IN £${actorStack.toFixed(0)}`
                  : aType === "fold-ante" ? `FOLD + PAY £${ANTE}`
                  : "CONFIRM →"}
              </button>
            </div>
          </div>
        ) : (
          <div className="all-folded-notice">All remaining players are all-in or folded.</div>
        )}

        {currentActions.length > 0 && (
          <div className="action-log-ro">
            {currentActions.map((a, i) => (
              <div key={i} className="al-row">
                <span className="al-type" style={{ color: ACTION_COLORS[a.type] }}>{a.type === "fold-ante" ? "fold+ante" : a.type}</span>
                <span className="al-player">{pMap[a.playerId]}</span>
                {a.amount != null && <span className="al-amount">£{a.amount.toFixed(2)}</span>}
              </div>
            ))}
          </div>
        )}

        {!bettingComplete && currentStreetIdx > 0 && (
          <div style={{ marginTop: "0.5rem" }}>
            <button className="btn-ghost" onClick={() => gotoStreet(currentStreetIdx - 1)}>
              ← BACK TO {STREET_LABELS[STREETS[currentStreetIdx - 1]]}
            </button>
          </div>
        )}
      </div>
    );
  }

  // -- Step 2: Showdown ------------------------------------------------------
  return (
    <div className="hand-logger">
      <div className="hl-header">
        <span className="hl-title">HAND #{handNumber} · SHOWDOWN</span>
        <button className="hl-cancel" onClick={onCancel}>✕</button>
      </div>
      <div className="pot-display" style={{ marginBottom: "1rem" }}>
        <span className="pot-label">FINAL POT</span>
        <span className="pot-value">£{livePot.toFixed(2)}</span>
      </div>
      <p className="muted" style={{ marginBottom: "0.875rem" }}>Cards shown. Mark the winner.</p>
      <div className="showdown-list">
        {stillIn.map(pid => (
          <div key={pid} className={`showdown-row ${winnerId === pid ? "sd-winner" : ""}`}>
            <div className="sd-left">
              <span className="sd-name">{pMap[pid]}</span>
              <input className="input sd-cards" data-pid={pid} placeholder="e.g. A♠ K♥"
                value={showdown[pid] || ""} onChange={e => setShowdown(s => ({ ...s, [pid]: e.target.value }))} />
            </div>
            <button className={`btn-winner ${winnerId === pid ? "btn-winner-active" : ""}`} onClick={() => setWinnerId(pid)}>
              {winnerId === pid ? "🏆 WON" : "WINNER?"}
            </button>
          </div>
        ))}
      </div>
      <div className="hl-footer">
        <button className="btn-ghost" onClick={() => setStep(1)}>← BACK</button>
        <button className="btn-primary" style={{ flex: 1 }} onClick={saveHand}>SAVE HAND →</button>
      </div>
    </div>
  );
}

// -- Close Session Modal -------------------------------------------------------
function CloseSessionModal({ session, players, onClose, onCancel }) {
  const sessionPlayers = players.filter(p => (session.playerIds || []).includes(p.id));
  const [finalStacks, setFinalStacks] = useState(
    Object.fromEntries(sessionPlayers.map(p => {
      const live = session.stacks?.[p.id] ?? session.buyIns?.[p.id] ?? 0;
      return [p.id, String(live)];
    }))
  );
  const totalIn = sessionPlayers.reduce((s, p) => s + (session.buyIns?.[p.id] || 0), 0);
  const totalOut = sessionPlayers.reduce((s, p) => s + (parseFloat(finalStacks[p.id]) || 0), 0);
  const diff = totalOut - totalIn;

  const submit = () => {
    for (const p of sessionPlayers) {
      if (finalStacks[p.id] === "" || isNaN(parseFloat(finalStacks[p.id]))) return alert(`Enter final stack for ${p.name}.`);
    }
    onClose(Object.fromEntries(sessionPlayers.map(p => [p.id, parseFloat(finalStacks[p.id])])));
  };

  return (
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-header">
          <span className="hl-title">CLOSE SESSION</span>
          <button className="hl-cancel" onClick={onCancel}>✕</button>
        </div>
        <p className="muted" style={{ marginBottom: "1.25rem" }}>Confirm each player's final stack.</p>
        <div className="close-list">
          {sessionPlayers.map(p => (
            <div key={p.id} className="close-row">
              <div className="close-player-info">
                <span className="close-player-name">{p.name}</span>
              </div>
              <div className="close-input-wrap">
                <label className="field-label-sm">FINAL STACK £</label>
                <input className="input close-input" type="number" min="0" placeholder="0"
                  value={finalStacks[p.id]} onChange={e => setFinalStacks(c => ({ ...c, [p.id]: e.target.value }))} />
              </div>
            </div>
          ))}
        </div>
        <div className={`close-balance ${Math.abs(diff) < 0.01 ? "bal-ok" : "bal-err"}`}>
          <span>In: £{totalIn.toFixed(0)}</span>
          <span>Out: £{totalOut.toFixed(0)}</span>
          <span className="bal-diff">{Math.abs(diff) < 0.01 ? "✓ Balanced" : `${diff > 0 ? "+" : ""}£${diff.toFixed(0)} off`}</span>
        </div>
        <button className="btn-primary" onClick={submit}>CONFIRM & CLOSE →</button>
      </div>
    </div>
  );
}

// -- Session Block -------------------------------------------------------------
function SessionBlock({ session, players, onUpdateSession, onDeleteSession }) {
  const [open, setOpen] = useState(!session.closed);
  const [loggingHand, setLoggingHand] = useState(false);
  const [closing, setClosing] = useState(false);
  const [bustNotice, setBustNotice] = useState(null); // name of busted player
  const pMap = Object.fromEntries(players.map(p => [p.id, p.name]));
  const sessionPlayers = players.filter(p => (session.playerIds || []).includes(p.id));
  const hands = session.hands || [];
  const results = sessionResults(session);
  const currentStacks = session.stacks || session.buyIns || {};

  const saveHand = ({ hand, newStacks }) => {
    // Check for bust: any session player at 0 chips
    const bustedPId = (session.playerIds || []).find(pid => (newStacks[pid] ?? 0) <= 0);
    if (bustedPId) {
      // Auto-close: final stacks ARE the cashouts
      const cashOuts = Object.fromEntries((session.playerIds || []).map(pid => [pid, newStacks[pid] ?? 0]));
      onUpdateSession(s => ({ ...s, hands: [...(s.hands || []), hand], stacks: newStacks, cashOuts, closed: true }));
      setBustNotice(pMap[bustedPId]);
    } else {
      onUpdateSession(s => ({ ...s, hands: [...(s.hands || []), hand], stacks: newStacks }));
    }
    setLoggingHand(false);
  };

  const deleteHand = id => {
    const remaining = hands.filter(h => h.id !== id);
    const freshStacks = { ...session.buyIns };
    remaining.forEach(h => {
      const c = computeCommitted(h.streets);
      Object.entries(c).forEach(([pid, amt]) => { freshStacks[pid] = (freshStacks[pid] || 0) - amt; });
      freshStacks[h.winnerId] = (freshStacks[h.winnerId] || 0) + h.pot;
    });
    onUpdateSession(s => ({ ...s, hands: remaining, stacks: freshStacks, cashOuts: {}, closed: false }));
  };

  const closeSession = cashOuts => {
    onUpdateSession(s => ({ ...s, cashOuts, closed: true }));
    setClosing(false);
  };

  const nextHandNum = hands.length + 1;
  const nextDealerPId = session.dealerStartIdx !== undefined
    ? getDealerPId(sessionPlayers, session.dealerStartIdx, nextHandNum)
    : null;

  return (
    <>
      {closing && (
        <CloseSessionModal session={session} players={players} onClose={closeSession} onCancel={() => setClosing(false)} />
      )}
      <div className="session-block">
        <div className="session-block-header" onClick={() => setOpen(o => !o)}>
          <div className="sb-left">
            <span className="sb-title">Session {session.number}</span>
            <span className={`sb-badge ${session.closed ? "badge-closed" : "badge-open"}`}>
              {session.closed ? "CLOSED" : "IN PLAY"}
            </span>
          </div>
          <div className="sb-right">
            <span className="muted">{hands.length} hand{hands.length !== 1 ? "s" : ""}</span>
            <span className="expand-icon">{open ? "▲" : "▼"}</span>
          </div>
        </div>

        {open && (
          <div className="session-block-body">
            {bustNotice && (
              <div className="bust-notice">
                💀 {bustNotice} is out of chips — session auto-closed.
                <button className="bust-dismiss" onClick={() => setBustNotice(null)}>✕</button>
              </div>
            )}

            <div className="sub-section-label">{session.closed ? "BUY-INS" : "LIVE STACKS"}</div>
            <div className="stacks-grid">
              {sessionPlayers.map(p => {
                const stack = session.closed ? session.buyIns?.[p.id] : currentStacks[p.id];
                const buyIn = session.buyIns?.[p.id] || 0;
                const diff = session.closed ? null : ((stack ?? buyIn) - buyIn);
                const isNextDealer = !session.closed && p.id === nextDealerPId;
                return (
                  <div key={p.id} className={`stack-tile ${isNextDealer ? "st-dealer" : ""}`}>
                    <span className="st-name">{p.name}</span>
                    {isNextDealer && <span className="st-d-badge">D</span>}
                    <span className="st-amount">£{(stack ?? buyIn).toFixed(0)}</span>
                    {!session.closed && diff !== null && (
                      <span className={`st-diff ${diff >= 0 ? "col-green" : "col-red"}`}>{fmt(diff)}</span>
                    )}
                  </div>
                );
              })}
            </div>

            {session.closed && (
              <>
                <div className="sub-section-label" style={{ marginTop: "0.875rem" }}>RESULTS</div>
                {results.sort((a, b) => (b.points || 0) - (a.points || 0)).map(r => (
                  <div key={r.playerId} className="result-row">
                    <span className="result-name">{pMap[r.playerId]}</span>
                    <div className="result-right">
                      <span className="muted">£{r.cashOut?.toFixed(0) ?? "—"} final</span>
                      <span className={r.points >= r.buyIn / POINTS_DIVISOR ? "col-green" : "col-red"}>
                        {r.points !== null ? `${r.points} pts` : "—"}
                      </span>
                    </div>
                  </div>
                ))}
              </>
            )}

            <div className="hands-section-header" style={{ marginTop: "0.875rem" }}>
              <div className="sub-section-label">HANDS ({hands.length})</div>
              {!session.closed && (
                <button className="btn-log-hand" onClick={() => setLoggingHand(l => !l)}>
                  {loggingHand ? "CANCEL" : "+ LOG HAND"}
                </button>
              )}
            </div>

            {loggingHand && !session.closed && session.dealerStartIdx !== undefined && (
              <HandLogger
                sessionPlayers={sessionPlayers}
                handNumber={nextHandNum}
                dealerStartIdx={session.dealerStartIdx}
                stacks={currentStacks}
                onSave={saveHand}
                onCancel={() => setLoggingHand(false)}
              />
            )}

            {hands.length === 0 && !loggingHand && (
              <div className="empty" style={{ padding: "0.875rem" }}>No hands logged yet.</div>
            )}
            {hands.map(h => (
              <div key={h.id} className="hand-wrap">
                <HandCard hand={h} pMap={pMap} />
                {!session.closed && (
                  <button className="hand-del-btn" onClick={() => deleteHand(h.id)}>delete hand</button>
                )}
              </div>
            ))}

            <div className="session-actions">
              {!session.closed && (
                <button className="btn-close-session" onClick={() => setClosing(true)}>CLOSE SESSION →</button>
              )}
              <button className="btn-danger" onClick={onDeleteSession}>Delete Session</button>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

// -- New Session Form ----------------------------------------------------------
function NewSessionForm({ players, nextNumber, onAdd, onCancel }) {
  const [selectedPIds, setSelectedPIds] = useState(players.map(p => p.id));
  const [buyIns, setBuyIns] = useState(Object.fromEntries(players.map(p => [p.id, String(DEFAULT_BUYIN)])));
  const [dealerPId, setDealerPId] = useState(players[0]?.id || "");
  const selectedPlayers = players.filter(p => selectedPIds.includes(p.id));

  const toggle = pid => {
    setSelectedPIds(prev => prev.includes(pid) ? prev.filter(x => x !== pid) : [...prev, pid]);
  };

  const submit = () => {
    if (selectedPIds.length < 2) return alert("Select at least 2 players.");
    for (const pid of selectedPIds) {
      if (!buyIns[pid] || isNaN(parseFloat(buyIns[pid]))) return alert(`Enter buy-in for ${players.find(p => p.id === pid)?.name}.`);
    }
    if (!dealerPId || !selectedPIds.includes(dealerPId)) return alert("Select a dealer from the players in this session.");
    const dealerStartIdx = selectedPIds.indexOf(dealerPId);
    const buyInsObj = Object.fromEntries(selectedPIds.map(pid => [pid, parseFloat(buyIns[pid])]));
    onAdd({
      id: uid(), number: nextNumber, closed: false, hands: [],
      playerIds: selectedPIds,
      buyIns: buyInsObj,
      cashOuts: {},
      stacks: { ...buyInsObj },
      dealerStartIdx
    });
  };

  return (
    <div className="new-session-form card">
      <div className="hl-header">
        <span className="hl-title">NEW SESSION {nextNumber}</span>
        <button className="hl-cancel" onClick={onCancel}>✕</button>
      </div>
      <p className="muted" style={{ marginBottom: "1rem" }}>Select players, confirm buy-ins, pick first dealer.</p>
      {players.map(p => (
        <div key={p.id} className="ns-player-row">
          <label className="player-check-row" style={{ flex: 1 }}>
            <input type="checkbox" checked={selectedPIds.includes(p.id)} onChange={() => toggle(p.id)} />
            <span>{p.name}</span>
          </label>
          {selectedPIds.includes(p.id) && (
            <input className="input ns-buyin" type="number" min="0" placeholder="£"
              value={buyIns[p.id]} onChange={e => setBuyIns(b => ({ ...b, [p.id]: e.target.value }))} />
          )}
        </div>
      ))}
      {selectedPlayers.length >= 2 && (
        <div style={{ marginTop: "1.25rem" }}>
          <div className="sub-section-label" style={{ marginBottom: "0.6rem" }}>FIRST DEALER</div>
          <div className="dealer-pick-row">
            {selectedPlayers.map(p => (
              <button key={p.id}
                className={`dealer-pick-btn ${dealerPId === p.id ? "dpb-active" : ""}`}
                onClick={() => setDealerPId(p.id)}>
                {dealerPId === p.id && <span className="dp-chip">♦</span>}
                {p.name}
              </button>
            ))}
          </div>
        </div>
      )}
      <button className="btn-primary" style={{ marginTop: "1.25rem" }} onClick={submit}>START SESSION →</button>
    </div>
  );
}

// -- Nights Tab ----------------------------------------------------------------
function NightsTab({ players, nights, onUpdateNight, onDeleteNight, onAddNight }) {
  const [expanded, setExpanded] = useState(nights[0]?.id || null);
  const [addingSession, setAddingSession] = useState(null);
  const [showNewNight, setShowNewNight] = useState(false);
  const [newSeason, setNewSeason] = useState("");
  const [newWeek, setNewWeek] = useState("");

  const createNight = () => {
    if (!newSeason || !newWeek || isNaN(+newSeason) || isNaN(+newWeek)) return alert("Enter valid season and week numbers.");
    const night = { id: uid(), season: parseInt(newSeason), week: parseInt(newWeek), date: new Date().toISOString().slice(0, 10), sessions: [] };
    onAddNight(night);
    setExpanded(night.id);
    setNewSeason(""); setNewWeek(""); setShowNewNight(false);
  };

  return (
    <div>
      <div className="section-header">
        <h2 className="section-title">NIGHTS</h2>
        <button className="btn-log-hand" onClick={() => setShowNewNight(v => !v)}>
          {showNewNight ? "CANCEL" : "+ NEW NIGHT"}
        </button>
      </div>

      {showNewNight && (
        <div className="card new-night-form">
          <div className="sub-section-label" style={{ marginBottom: "0.75rem" }}>NEW NIGHT</div>
          <div className="nn-row">
            <div>
              <label className="field-label">SEASON</label>
              <input className="input" type="number" min="1" placeholder="1" value={newSeason} onChange={e => setNewSeason(e.target.value)} />
            </div>
            <div>
              <label className="field-label">WEEK</label>
              <input className="input" type="number" min="1" placeholder="1" value={newWeek} onChange={e => setNewWeek(e.target.value)} />
            </div>
          </div>
          {newSeason && newWeek && <div className="night-label-preview">Season {newSeason}, Week {newWeek}</div>}
          <button className="btn-primary" style={{ marginTop: "1rem" }} onClick={createNight}>CREATE NIGHT →</button>
        </div>
      )}

      {nights.length === 0 && !showNewNight && <div className="empty">No nights yet. Create one to get started.</div>}

      {nights.map(night => {
        const isOpen = expanded === night.id;
        const totalSessions = night.sessions?.length || 0;
        const nightPnl = {};
        night.sessions?.forEach(s => {
          if (!s.closed) return;
          sessionResults(s).forEach(r => {
            if (r.pnl !== null) nightPnl[r.playerId] = (nightPnl[r.playerId] || 0) + r.pnl;
          });
        });
        const bigWinner = Object.entries(nightPnl).sort((a, b) => b[1] - a[1])[0];
        const winnerName = bigWinner ? players.find(p => p.id === bigWinner[0])?.name : null;

        return (
          <div key={night.id} className="night-card">
            <div className="night-header" onClick={() => setExpanded(isOpen ? null : night.id)}>
              <div>
                <div className="night-label">{nightLabel(night)}</div>
                <div className="muted">{fmtDate(night.date)} · {totalSessions} session{totalSessions !== 1 ? "s" : ""}{winnerName ? ` · 🏆 ${winnerName}` : ""}</div>
              </div>
              <span className="expand-icon">{isOpen ? "▲" : "▼"}</span>
            </div>
            {isOpen && (
              <div className="night-body">
                {(night.sessions || []).map(sess => (
                  <SessionBlock key={sess.id} session={sess} players={players}
                    onUpdateSession={fn => onUpdateNight(night.id, n => ({ ...n, sessions: n.sessions.map(s => s.id === sess.id ? fn(s) : s) }))}
                    onDeleteSession={() => onUpdateNight(night.id, n => ({ ...n, sessions: n.sessions.filter(s => s.id !== sess.id) }))}
                  />
                ))}
                {addingSession === night.id ? (
                  <NewSessionForm players={players} nextNumber={(night.sessions?.length || 0) + 1}
                    onAdd={sess => { onUpdateNight(night.id, n => ({ ...n, sessions: [...(n.sessions || []), sess] })); setAddingSession(null); }}
                    onCancel={() => setAddingSession(null)}
                  />
                ) : (
                  <button className="btn-add-session" onClick={() => setAddingSession(night.id)}>+ ADD SESSION</button>
                )}
                <button className="btn-danger" style={{ alignSelf: "flex-start" }} onClick={() => onDeleteNight(night.id)}>Delete Night</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// -- Leaderboard Tab -----------------------------------------------------------
function LeaderboardTab({ players, nights }) {
  const [view, setView] = useState("overall"); // "overall" | nightId
  const board = calcLeaderboard(players, nights);
  const medals = ["🥇", "🥈", "🥉"];
  const totalNights = nights.length;
  const totalHands = nights.reduce((s, n) => s + (n.sessions || []).reduce((s2, sess) => s2 + (sess.hands || []).length, 0), 0);
  const fmtPts = p => Math.floor(p).toString();

  // Group nights by season, sorted season desc then week desc
  const seasons = {};
  nights.forEach(n => {
    if (!seasons[n.season]) seasons[n.season] = [];
    seasons[n.season].push(n);
  });
  const sortedSeasons = Object.keys(seasons).map(Number).sort((a, b) => b - a);

  const selectedNight = nights.find(n => n.id === view);
  const nightBoard = selectedNight ? calcNightLeaderboard(players, selectedNight) : null;

  return (
    <div>
      <div className="section-header">
        <h2 className="section-title">LEADERBOARD</h2>
        <span className="muted">{totalNights} night{totalNights !== 1 ? "s" : ""} · {totalHands} hands</span>
      </div>

      {/* View switcher */}
      <div className="lb-tabs">
        <button className={`lb-tab ${view === "overall" ? "lb-tab-active" : ""}`} onClick={() => setView("overall")}>
          OVERALL
        </button>
        {sortedSeasons.map(season => (
          <div key={season} className="lb-season-group">
            <div className="lb-season-label">S{season}</div>
            {seasons[season].sort((a, b) => b.week - a.week).map(n => (
              <button key={n.id} className={`lb-tab ${view === n.id ? "lb-tab-active" : ""}`} onClick={() => setView(n.id)}>
                W{n.week}
              </button>
            ))}
          </div>
        ))}
      </div>

      {totalNights === 0 ? <div className="empty">No nights logged yet.</div> : view === "overall" ? (
        <>
          <div className="lb-section-label">ALL TIME · POINTS</div>
          <div className="leaderboard">
            {board.map((p, i) => (
              <div key={p.id} className={`lb-row ${p.points > DEFAULT_BUYIN / POINTS_DIVISOR * p.sessions ? "lb-up" : p.points < DEFAULT_BUYIN / POINTS_DIVISOR * p.sessions ? "lb-down" : ""}`}>
                <span className="lb-rank">{medals[i] || `#${i + 1}`}</span>
                <div className="lb-info">
                  <span className="lb-name">{p.name}</span>
                  <span className="lb-meta">{p.sessions} session{p.sessions !== 1 ? "s" : ""} · {p.wins} win{p.wins !== 1 ? "s" : ""}</span>
                </div>
                <span className={`lb-pnl ${p.points >= DEFAULT_BUYIN / POINTS_DIVISOR * p.sessions ? "col-green" : "col-red"}`}>
                  {fmtPts(p.points)} pts
                </span>
              </div>
            ))}
          </div>
        </>
      ) : nightBoard && (
        <>
          <div className="lb-section-label">{nightLabel(selectedNight)} · {fmtDate(selectedNight.date)}</div>
          {nightBoard.length === 0 ? (
            <div className="empty">No closed sessions for this night yet.</div>
          ) : (
            <div className="leaderboard">
              {nightBoard.map((p, i) => (
                <div key={p.id} className={`lb-row ${p.points > DEFAULT_BUYIN / POINTS_DIVISOR ? "lb-up" : "lb-down"}`}>
                  <span className="lb-rank">{medals[i] || `#${i + 1}`}</span>
                  <div className="lb-info">
                    <span className="lb-name">{p.name}</span>
                    <span className="lb-meta">{p.sessions} session{p.sessions !== 1 ? "s" : ""}</span>
                  </div>
                  <span className={`lb-pnl ${p.points >= DEFAULT_BUYIN / POINTS_DIVISOR ? "col-green" : "col-red"}`}>
                    {fmtPts(p.points)} pts
                  </span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// -- Save File Menu ------------------------------------------------------------
const INDEX_KEY = "felt_index_v1";

function getSaveIndex() {
  try { return JSON.parse(localStorage.getItem(INDEX_KEY)) || []; } catch { return []; }
}
function setSaveIndex(idx) {
  try { localStorage.setItem(INDEX_KEY, JSON.stringify(idx)); } catch {}
}
function loadSave(id) {
  try { return JSON.parse(localStorage.getItem("felt_save_" + id)) || { players: [], nights: [] }; } catch { return { players: [], nights: [] }; }
}
function writeSave(id, data) {
  try { localStorage.setItem("felt_save_" + id, JSON.stringify(data)); } catch {}
}
function deleteSave(id) {
  try { localStorage.removeItem("felt_save_" + id); } catch {}
}

function SaveMenu({ onLoad }) {
  const [saves, setSaves] = useState(getSaveIndex);
  const [newName, setNewName] = useState("");
  const [creating, setCreating] = useState(false);

  const create = () => {
    const name = newName.trim();
    if (!name) return alert("Enter a name for this save.");
    const id = uid();
    const now = new Date().toISOString();
    const entry = { id, name, created: now, lastPlayed: now };
    const updated = [entry, ...saves];
    setSaveIndex(updated);
    setSaves(updated);
    writeSave(id, { players: [], nights: [] });
    setNewName(""); setCreating(false);
    onLoad(id, name);
  };

  const load = (entry) => {
    const updated = saves.map(s => s.id === entry.id ? { ...s, lastPlayed: new Date().toISOString() } : s);
    setSaveIndex(updated); setSaves(updated);
    onLoad(entry.id, entry.name);
  };

  const remove = (e, id) => {
    e.stopPropagation();
    if (!window.confirm("Delete this save? This cannot be undone.")) return;
    const updated = saves.filter(s => s.id !== id);
    setSaveIndex(updated); setSaves(updated);
    deleteSave(id);
  };

  return (
    <div className="save-menu">
      <div className="save-logo-row">
        <span className="suit-deco">♠</span>
        <h1 className="logo">FELT</h1>
        <span className="suit-deco">♣</span>
      </div>
      <p className="tagline" style={{ textAlign: "center", marginBottom: "2rem" }}>your game. your ledger.</p>

      {saves.length > 0 && (
        <div className="save-list">
          <div className="sub-section-label" style={{ marginBottom: "0.75rem" }}>SAVED GAMES</div>
          {saves.map(s => (
            <div key={s.id} className="save-entry" onClick={() => load(s)}>
              <div className="save-entry-info">
                <span className="save-entry-name">{s.name}</span>
                <span className="muted">Last played {fmtDate(s.lastPlayed)}</span>
              </div>
              <div className="save-entry-actions">
                <span className="save-continue">CONTINUE →</span>
                <button className="save-delete" onClick={e => remove(e, s.id)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{ marginTop: saves.length > 0 ? "1.5rem" : "0" }}>
        {creating ? (
          <div className="save-new-form">
            <div className="sub-section-label" style={{ marginBottom: "0.6rem" }}>NEW GAME</div>
            <input className="input" placeholder="Name this save (e.g. Henry's Game)" value={newName}
              onChange={e => setNewName(e.target.value)}
              onKeyDown={e => e.key === "Enter" && create()} autoFocus />
            <div style={{ display: "flex", gap: "0.5rem", marginTop: "0.75rem" }}>
              <button className="btn-ghost" style={{ flex: 1 }} onClick={() => setCreating(false)}>CANCEL</button>
              <button className="btn-primary" style={{ flex: 2 }} onClick={create}>CREATE →</button>
            </div>
          </div>
        ) : (
          <button className="btn-primary" onClick={() => setCreating(true)}>
            + NEW GAME
          </button>
        )}
      </div>
    </div>
  );
}

// -- Root ----------------------------------------------------------------------
function App() {
  const [saveId, setSaveId] = useState(null);
  const [saveName, setSaveName] = useState("");
  const [players, setPlayers] = useState([]);
  const [nights, setNights] = useState([]);
  const [tab, setTab] = useState("ledger");

  const handleLoad = (id, name) => {
    const data = loadSave(id);
    setPlayers(data.players || []);
    setNights(data.nights || []);
    setSaveId(id);
    setSaveName(name);
    setTab("ledger");
  };

  // Persist whenever data changes
  useEffect(() => {
    if (!saveId) return;
    writeSave(saveId, { players, nights });
  }, [players, nights, saveId]);

  const updateNight = (id, fn) => setNights(prev => prev.map(n => n.id === id ? fn(n) : n));

  const resetSave = () => {
    if (!window.confirm("Clear all data for this save and start fresh? This cannot be undone.")) return;
    setPlayers([]); setNights([]); setTab("ledger");
  };

  const exitToMenu = () => {
    setSaveId(null); setSaveName(""); setPlayers([]); setNights([]);
  };

  const TABS = [
    { id: "ledger", icon: "♠", label: "LEDGER" },
    { id: "nights", icon: "♦", label: "NIGHTS" },
  ];

  if (!saveId) return (
          <SaveMenu onLoad={handleLoad} />
    
  );

  return (
          <div className="app">
        <header className="app-header">
          <div className="header-row">
            <span className="suit-deco">♠</span>
            <h1 className="logo">FELT</h1>
            <span className="suit-deco">♣</span>
          </div>
          <p className="tagline">{saveName}</p>
          <div className="header-btns">
            <button className="btn-reset" onClick={exitToMenu}>← menu</button>
            <button className="btn-reset" onClick={resetSave}>reset</button>
          </div>
        </header>
        <main className="main">
          {players.length === 0 ? <SetupScreen onSave={setPlayers} /> : (
            <>
              {tab === "ledger" && <LeaderboardTab players={players} nights={nights} />}
              {tab === "nights" && (
                <NightsTab players={players} nights={nights}
                  onUpdateNight={updateNight}
                  onDeleteNight={id => setNights(n => n.filter(x => x.id !== id))}
                  onAddNight={night => setNights(n => [night, ...n])}
                />
              )}
            </>
          )}
        </main>
        {players.length > 0 && (
          <nav className="bottom-nav">
            {TABS.map(t => (
              <button key={t.id} className={`nav-btn ${tab === t.id ? "nav-btn-active" : ""}`} onClick={() => setTab(t.id)}>
                <span className="nav-icon">{t.icon}</span>
                <span className="nav-label">{t.label}</span>
              </button>
            ))}
          </nav>
        )}
      </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
